# GatewayOS2 — Nginx Configuration
# Copy to /etc/nginx/sites-available/gatewayos2.conf and symlink to sites-enabled

server {
    listen 80;
    server_name gatewayos2.com www.gatewayos2.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gatewayos2.com www.gatewayos2.com;

    # SSL — update paths to your certificate
    ssl_certificate     /etc/letsencrypt/live/gatewayos2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gatewayos2.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/gatewayos2/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block access to sensitive directories
    location ~ /\. { deny all; }
    location ^~ /data/ { deny all; }
    location ^~ /config/ { deny all; }
    location ^~ /lib/ { deny all; }
    location ^~ /controllers/ { deny all; }
    location ^~ /templates/ { deny all; }
    location ^~ /src/ { deny all; }
    location ^~ /tools/ { deny all; }
    location ^~ /tests/ { deny all; }
    location ^~ /bin/ { deny all; }
    location ^~ /_old_public/ { deny all; }

    # Static asset caching
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # Front controller — send all non-file requests to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}
